<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function converter(){
            let celsius = document.getElementById("celsius").value;
            let fahr = (celsius * (9 / 5)) + 32;
            document.getElementById("fahr").value = fahr.toFixed(2);
        }
    </script>
</head>

<body>
    <label for="" >Enter temperature in celsius</label>
    <input type="number" name="" id="celsius" oninput="converter()">

    <label for="">Temperature in Fahrenheit</label>
    <input type="number" name="" id="fahr" readonly>

</body>
</html>
